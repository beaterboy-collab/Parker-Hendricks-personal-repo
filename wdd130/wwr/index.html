<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Dry Oar Boating</title>
    <link rel="stylesheet" href="../styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div id="max-width">
    <div id="main-background">
    
    
    <header>
        <a id="logo_link" href="index.html">
        <img class="logo" src="../images/logo.png" alt="Dry Oar Logo">
        </a>
        <nav>
            <a href="index.html" class="main-links">Home</a>
            <a href="#" class="main-links">Page 2</a>
            <a href="site-plan-rafting.html" class="main-links">Site Plan</a>
            <a href="contactus.html" class="main-links">Contact Us</a>
        </nav>
    </header>

    <div id="hero">
        <div id="hero-box">
            <img id="hero-img" src="../images/hero.png" alt="People rafting">
        </div>
        <section id="hero-msg">
            <h1 class="hometitle">Ready for an Adventure?</h1>
            <h4>Loved by all who come</h4>
            <div class='button-box'>
                <a class='book' href="contactus.html"> Book Now </a>
            </div>
        </section>
    </div>

    <main class="home-grid">
        <section class="rivers-card">
            <img class="card-img" src="../images/rivers.jpg" alt="River">
            <img class="icon" src="../images/river_icon.png" alt="River Icon">
            <h2>Our Rivers</h2>
        </section>    
        <section class="camping-card">
            <img class="card-img" src="../images/camping.jpg" alt="Tent in the forest">
            <img class="icon" src="../images/fire_icon.png" alt="Fire icon">
            <h2>Camping</h2>
        </section>
        <section class="rapids-card">
            <img class="card-img" src="../images/rapids.jpg" alt="Rafting boat">
            <img class="icon" src="../images/oars.png" alt="Oars Icon">
            <h2>Rapids</h2>
        </section>
        <div id="background"></div>
    </main>

    <footer>
        <p>Dry Oar &copy; 2026 | Parker Hendricks</p>
        <p><a href="site-plan-rafting.html">Site Plan</a></p>
        <p><a href="contactus.html">Contact Us</a></p>
        <div class="social">
            <a href="https://www.facebook.com/dryoar" target="_blank">
                <img src="../images/facebook.png" alt="Facebook Icon">
            </a>
            <a href="https://www.instagram.com/dryoar" target="_blank">
                <img src="../images/instagram.png" alt="Instagram Icon">
            </a>
            <a href="https://www.twitter.com/dryoar" target="_blank">
                <img src="../images/twitter.png" alt="Twitter Icon">
            </a>
        </div>
    </footer>

    <script src="scripts.js" defer></script>
    </div>
    </div>
</body>
</html>
