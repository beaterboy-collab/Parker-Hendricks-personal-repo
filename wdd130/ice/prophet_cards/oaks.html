<!DOCTYPE html>
<html lang="en">
<head>

    <title>Dallin H. Oaks</title>
    
    <!-- Style -->
    <style>
        body {
            background: #FFECD7;

        }

        .blue-background {
            background-color: #008db1;
            width: 40%;
            height: 90%;
            border-radius: 15px;
            margin: auto;
            border: 3px solid black;

        }
        .prophet-name {
            color: white;
            text-align: center;
            padding-top: 15px;
            padding-bottom: 5px;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 40px;
            margin: 0;
        }
        p {
            color: #91e4fb;
            text-align: center;
            padding-bottom: 20px;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
        }
        a {
            text-decoration: none;
        }
        img {
            margin: auto;
            display: block;
            width: 60%;
            border: 5px solid white;
        }
        img:hover {
            transform: scale(1.2);
            box-shadow: #333333;
            transition: 0.5s;
}
        ul {
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 18px;
            padding-left: 100px;
        }
        li {
            padding-bottom: 5px;
        }
        blockquote {
            color: #ffd783;

        }

<!-- Card -->


<body>
    <div class="blue-background">
        <h1 class="prophet-name">Dallin H. Oaks</h1>
        <a href="https://www.churchofjesuschrist.org/?lang=eng">
            <p> 18th President on the Church of Jesus Christ of Latter-day Saints </p>
        </a>
        <img src="images/oaks.webp" alt="Picture of President Dallin H. Oaks" >

        <ul>
            <li>Born: Aug 12, 1932 </li>
            <li> Apostle: Apr 7, 1984</li>
            <li> Prophet: Oct 14, 2025</li>
        </ul>

        <blockquote>"The only solution to the differences that divide us is for all of us to follow our Savior's teachings and to graudally become even as he is."</blockquote>





    </div>

</html>
