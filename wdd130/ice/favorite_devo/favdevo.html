<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Favorite Devotionals</title>
  <link rel="stylesheet" href="styles/styles.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-image">
        <h1>My Favorite<br>Devotionals</h1>
      </div>
    </header>
    <main>
      <div class="content-box">
        <table>
          <thead>
            <tr>
              <th>Speaker</th>
              <th>Title</th>
              <th>Location</th>
              <th>Year</th>
            </tr>
          </thead>
           
          <tbody>
            <tr>
              <td>Elder Jörg Klebingat</td>
              <td>"The Atonement of Jesus Christ, Judgment Day, and You"</td>
              <td>BYU-I I-Center</td>
              <td>Oct, 2024</td>
            </tr>
            <tr>
              <td>Elder Lawrence E. Corbridge</td>
              <td>"Stand Forever"</td>
              <td>BYU-I I-center</td>
              <td>Jan, 2019</td>
            </tr>
            <tr>
              <td>Elder David A. Bednar</td>
              <td>"The Character of Christ"</td>
              <td>Hart Auditorium</td>
              <td>Jan, 2003</td>
            </tr>
          </tbody>
        </table>

            <form>
              <label for="speaker"> Speaker</label>
              <input type="text" placeholder="Speaker name" name="title" id="title" required>

              <label for="Title"> Title</label>
              <input type="text" placeholder="Title name" name="title" id="title" required>

              <label for="Location"> Location</label>
              <input type="text" placeholder="Location name" name="Location" id="Location" required>

              <label for="Year"> Year</label>
              <input type="text" placeholder="Date" name="Year" id="Year" required>

            </form>











      </div>
    </main>
  </div>
</body>
</html>
