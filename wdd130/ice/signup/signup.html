<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Feed Sign Up</title>

    <style>
        * {
            margin: 0;
        }

        body {
            background: rgb(120, 96, 64);
        }

        #formContainer {
            background: rgb(255, 255, 255);
            width: 400px;
            border-radius: 20px;
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 10px solid darkblue;
            overflow: hidden;
        }
        #formContainer h3 {
            text-align: center;
            padding: 20px 0;
            font-weight: bold;
        }
        #scripture-pics {
            display: flex;
            flex-direction: row;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }
        #scripture-pics img {
            width: 19%;
            height: auto;
        }
        #jesus-5000 {
            width: 100%;
            height: auto;
            border-radius: 10px 10px 0 0;
        }
        #daily-feed {
            text-align: center;
            color: white;
            font-family: "Playfair Display", Georgia, "Times New Roman", serif;
            font-weight: 800;
            font-size: 2rem; 
            margin: 0;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.6);
        }
        #scripture-a-day {
            text-align: center;
            font-size: 18px;
            color: White;
            margin-bottom: 20px;
            font-family: "Playfair Display", Georgia, "Times New Roman", serif;
            font-weight: 800;
            font-size: 1.5rem; 
            margin: 0;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.6);
        }
        #text-overlay {
            position: absolute;
            top: 75px;
            left: 50%;
            transform: translateX(-50%);
        }
        form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 0 20px 20px 20px;
        }
        #closeBtn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            border: none;
            font-size: 20px;
            cursor: pointer;
        }
        #center-text {
            grid-column: 1 / -1;
            text-align: center;
        }
        .section-pad {
            padding: 10px 0;
        }
    </style>




</head>

<body>
    <div id="formContainer">
        <img src="images/jesus_feeds_5000.jpeg" id="jesus-5000">
        <h3>Sign Up for Daily Scripture Feed</h3>
        <div id="text-overlay">
        <h1 id="daily-feed">Daily Feed</h1>
        <h1 id="scripture-a-day">Scripture a Day</h1>
        </div>
        <form id="myForm">
            <button type="button" id="closeBtn">X</button>
            <label for="username">User Name:</label>
            <input type="text" id="username" name="username" required>

            <label for="password">Password:</label>
            <input type="password" id="password" name="password" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label>Gender:</label>
            <div>
                <input type="radio" id="male" name="gender" value="male" required>
                <label for="male">Male</label>
                <input type="radio" id="female" name="gender" value="female" required>
                <label for="female">Female</label>
            </div>
            <div id="center-text">
            <section class="section-pad">
                <input type="checkbox" id="newsletter" name="newsletter">
                <label for="newsletter">Subscribe to newsletter</label>
            </section>

            <section class="section-pad">
                <input type="checkbox" id="conditions" name="conditions" required>
                <label for="conditions">I acknowledge the terms and conditions</label>
            </section>

            <section class="section-pad">
                <button type="submit">Submit</button>
            </section>
            </div>
        </form>

    <div id="scripture-pics">
        <img src="images/old_testament.webp">
        <img src="images/new_testament.webp">
        <img src="images/book_of_mormon.webp">
        <img src="images/doctrine_and_covenants.webp">
        <img src="images/pearl_of_great_price.webp">
    </div>
    </div>

    <div id="output"></div>

    <script>
        // Here is some Javascript to start looking forward to wdd131
        document.getElementById("closeBtn").addEventListener("click", function () {
            document.getElementById("formContainer").style.display = "none";
         });
        const form = document.getElementById('myForm');
        const output = document.getElementById('output');

        form.addEventListener('submit', function (event) {
            event.preventDefault(); // Stop form from actually submitting

            const formData = new FormData(form);
            const entries = [];

            for (const [key, value] of formData.entries()) {
                if (key == "password") {
                    entries.push(`<strong>${key}</strong>: ${value} (you should probably encrypt the password)`);
                } else {
                    entries.push(`<strong>${key}</strong>: ${value}`);
                }
            }

            output.innerHTML = `
            <br>  
            <h3>Here is the data that would be sent to the server:</h3>
            <ul>
                ${entries.map(item => `<li>${item}</li>`).join('')}
            </ul>
            `;
                });
    </script>



</body>

</html>
